backend:
  type: redis
  address: "redis:6379"
  password: ""
  db: 0
  dial_timeout_ms: 500
  read_timeout_ms: 100
  write_timeout_ms: 100
  pool_size: 20

proxy:
  listen_addr: "0.0.0.0:6380"
  grpc_addr: "0.0.0.0:9090"

coordinator:
  prefetch_workers: 8
  prefetch_threshold: 0.665
  max_prefetch_queue_depth: 1024

engine:
  markov_order: 2
  max_tracked_keys: 100000